name: build

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: set version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev" >> "$GITHUB_OUTPUT"
          fi

      - run: go build -ldflags "-X deploycli/internal/static.Version=${{ steps.version.outputs.value }}" -o deploycli .

      - uses: actions/upload-artifact@v4
        with:
          name: deploycli-${{ steps.version.outputs.value }}
          path: deploycli
